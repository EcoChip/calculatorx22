<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Pro</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calc { background: #333; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        #display { width: 100%; height: 50px; background: #222; border: none; color: #0f0; text-align: right; font-size: 24px; padding: 10px; box-sizing: border-box; border-radius: 10px; margin-bottom: 20px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; border-radius: 10px; border: none; background: #444; color: white; font-size: 18px; cursor: pointer; }
        button:active { background: #666; }
        .op { background: #f39c12; }
        .equal { background: #27ae60; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calc">
    <input type="text" id="display" disabled value="0">
    <div class="buttons">
        <button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button class="op" onclick="add('/')">/</button>
        <button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button class="op" onclick="add('*')">*</button>
        <button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button class="op" onclick="add('-')">-</button>
        <button onclick="add('0')">0</button><button onclick="clearC()">C</button><button class="equal" onclick="calcular()">=</button><button class="op" onclick="add('+')">+</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');

    function add(val) {
        if(display.value === "0") display.value = val;
        else display.value += val;
    }

    function clearC() { display.value = "0"; }

    function calcular() {
    // Si el usuario pone el código de la calculadora '8008'
    if (display.value === "8008") {
        // Redirigir directamente a tu subdominio de Serveo
        let urlProxy = "https://mi-calculadora-secreta.serveo.net/index.php"; 
        window.location.href = urlProxy;
    } else {
        // Si no es el código secreto, hace una operación normal
        try { display.value = eval(display.value); }
        catch { display.value = "Error"; }
    }
}
</script>
</body>
</html>
