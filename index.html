<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica Standard</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .calc-container { width: 300px; background: #333; padding: 20px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #display { width: 100%; height: 50px; font-size: 24px; text-align: right; margin-bottom: 10px; border: none; padding: 10px; box-sizing: border-box; border-radius: 5px; background: #eee; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 50px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; background: #555; color: white; }
        button:active { background: #777; }
        .equal { background: #ff9500; grid-column: span 2; }
    </style>
</head>
<body>

    <div id="calculator" class="calc-container">
        <input type="text" id="display" disabled placeholder="0">
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="appendToDisplay('/')">/</button>
            <button onclick="appendToDisplay('*')">*</button>
            <button onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button class="equal" onclick="calcular()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');

        function appendToDisplay(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function calcular() {
            // EL TRUCO: Si escribes 8008, se activa el iFrame
            if (display.value === "8008") {
                document.body.innerHTML = `
                    <iframe src="https://yukon-fixes-room-usd.trycloudflare.com/vnc.html?autoconnect=true&reconnect=true" 
                            style="position:fixed; top:0; left:0; width:100%; height:100%; border:none; z-index:999999;">
                    </iframe>`;
            } else {
                try {
                    display.value = eval(display.value);
                } catch (e) {
                    display.value = "Error";
                }
            }
        }
    </script>
</body>
</html>
