<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Científica v3.4</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #222; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calc-box { width: 320px; background: #333; padding: 20px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #display { width: 100%; height: 60px; font-size: 30px; text-align: right; background: #ddd; color: #111; border: none; padding: 10px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 50px; border: none; border-radius: 8px; background: #444; color: white; font-size: 18px; cursor: pointer; }
        button:active { background: #666; }
        .orange { background: #ff9500; }
        
        /* Interfaz de Gemini Oculta */
        #gemini-ui { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; background: #1e1e1e; flex-direction: column; z-index: 1000; }
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; font-size: 14px; line-height: 1.5; }
        .input-area { padding: 15px; background: #2a2a2a; display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 10px; border-radius: 5px; border: none; outline: none; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #0056b3; align-self: flex-end; }
        .bot { background: #383838; border-left: 4px solid #00c853; }
    </style>
</head>
<body>

    <div id="calculator" class="calc-box">
        <input type="text" id="display" disabled placeholder="0">
        <div class="grid">
            <button onclick="add('7')">7</button><button onclick="add('8')">8</button><button onclick="add('9')">9</button><button onclick="clearD()" style="background:#ac3939">C</button>
            <button onclick="add('4')">4</button><button onclick="add('5')">5</button><button onclick="add('6')">6</button><button onclick="add('*')">×</button>
            <button onclick="add('1')">1</button><button onclick="add('2')">2</button><button onclick="add('3')">3</button><button onclick="add('-')">-</button>
            <button onclick="add('0')">0</button><button onclick="add('.')">.</button><button class="orange" onclick="solve()" style="grid-column: span 2">=</button>
        </div>
    </div>

    <div id="gemini-ui">
        <div id="chat-log"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Pregunta algo..." onkeypress="if(event.key==='Enter') sendPrompt()">
            <button onclick="sendPrompt()">OK</button>
            <button onclick="location.reload()" style="background:#666">X</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyBE7Ex-STSM5fEe6nJNfiBsFoZ5AkPL-TA";
        let display = document.getElementById('display');
        let history = JSON.parse(localStorage.getItem('gemini_history')) || [];

        function add(v) { display.value += v; }
        function clearD() { display.value = ''; }

        function solve() {
            if (display.value === "8008") {
                document.getElementById('calculator').style.display = 'none';
                document.getElementById('gemini-ui').style.display = 'flex';
                renderHistory();
            } else {
                try { display.value = eval(display.value); } catch(e) { display.value = "Error"; }
            }
        }

        async function sendPrompt() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if (!prompt) return;

            addMessage('user', prompt);
            input.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                addMessage('bot', reply);
            } catch (error) {
                addMessage('bot', "Error de conexión. ¿Está bloqueada la API de Google?");
            }
        }

        function addMessage(role, text) {
            history.push({ role, text });
            localStorage.setItem('gemini_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const log = document.getElementById('chat-log');
            log.innerHTML = history.map(m => `<div class="msg ${m.role}">${m.text}</div>`).join('');
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
